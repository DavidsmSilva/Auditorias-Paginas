# ============================================================================
# settings.cfg — PaginasAudit Cyber Audit User Configuration
# ============================================================================
# This file is sourced by audit.sh at startup.
# Auto-generated on first run; edit to customize behavior.
# ============================================================================

# --- Installation Settings ---

# Log level: DEBUG | INFO | WARN | ERROR
LOG_LEVEL="INFO"

# Enable JSON logging (true/false)
LOG_JSON=false

# Retry count for failed installations
INSTALL_RETRIES=2

# Retry delay in seconds
INSTALL_RETRY_DELAY=3

# Timeout per tool installation (seconds)
INSTALL_TIMEOUT=300

# --- Update Settings ---

# Check for updates on startup (true/false)
UPDATE_CHECK=true

# Update channel: stable | beta
UPDATE_CHANNEL="stable"

# --- Reporting ---

# Generate report after installation (true/false)
GENERATE_REPORT=true

# Report format: txt, json, or both
REPORT_FORMAT="both"

# Open report after generation (true/false)
OPEN_REPORT=false

# --- Behavior ---

# Auto-install dependencies (true/false)
AUTO_INSTALL_DEPS=true

# Skip already-installed tools (true/false)
SKIP_INSTALLED=true

# Show tool descriptions during install (true/false)
SHOW_TOOL_DESCS=true

# Parallel installs (experimental, true/false)
PARALLEL_INSTALL=false

# Max parallel jobs (if PARALLEL_INSTALL=true)
MAX_PARALLEL_JOBS=3

# --- Advanced ---

# Custom apt repository mirror (leave empty for default)
APT_MIRROR=""

# Custom install prefix (leave empty for default)
INSTALL_PREFIX=""

# Save downloaded packages (true/false)
KEEP_DOWNLOADS=false

# Download cache directory
CACHE_DIR="/tmp/PaginasAudit-cache"

# --- Reporting Meta ---

# Auditor name (for report headers)
AUDITOR_NAME=""

# Client name (for report headers)
CLIENT_NAME=""

# Engagement ID (for report tracking)
ENGAGEMENT_ID=""
